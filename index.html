<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Painting</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="house">
        <div id="chimney"></div>
        <div id="roof"></div>
        <div id="window-1">
            <div class="window-1-frame-v"></div>
            <div class="window-1-frame-h"></div>
        </div>
        <div id="window-2">
            <div class="window-2-frame-v"></div>
            <div class="window-2-frame-h"></div>

        </div>

        <div id="door">
            <div class="door-frame-top"></div>
            <div class="door-frame-bottom"></div>
            <div class="door-handle"></div>
        </div>
    </div>
</body>
</html>
